<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin Fashion</title>
    <!-- Fav Icon -->
    <link rel="shortcut icon" href="/icons/fav-icon.png" type="image/x-icon">

    <!-- Font Awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Theme color -->
    <style type="text/tailwindcss">
        @theme {
            --color-primary: #FABE4C;
            --color-secondary: #363958;
            --color-accent: #3E3E3E;
        }
    </style>
    <!-- Tailwind Css & Css File -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/style/style.css">

</head>

<body>
    <!-- Header -->
    <header class="bg-[#FFFBF0]">
        <!-- Navbar -->
        <nav
            class="container mx-auto px-3 py-5 lg:bg-[url(/icons/bar.png)] bg-no-repeat bg-top flex items-center justify-between">
            <!-- Logo -->
            <div class="cursor-pointer">
                <img class="w-[192px] lg:w-[290px]" src="/icons/logo.png" alt="">
            </div>

            <!-- Nav Items -->
            <div>
                <ul class="hidden lg:flex items-center gap-9 text-secondary text-base font-medium">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Product</a></li>
                    <li><a href="#">About us</a></li>
                    <li><a href="#">Contact us</a></li>
                </ul>
                <div class="lg:hidden cursor-pointer">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </div>
            </div>
        </nav>

        <!-- Hero section -->
        <section
            class="container mx-auto px-3 pt-10 pb-16 md:pb-32 flex gap-20 md:gap-0 flex-col md:flex-row items-center justify-between">
            <!-- Content part -->
            <div>
                <h1 class="text-6xl md:text-7xl text-secondary"><span class="text-primary">Be the Penguins</span><br>of
                    Winter</h1>
                <p class="text-base leading-6 text-accent md:w-3/4 my-3">
                    Lorem Ipsum is simply dummy text of the printing
                    and typesetting industry.
                </p>
                <button
                    class="px-8 py-4 rounded-lg text-base font-medium text-white bg-gradient-to-r from-[#A4BC46] to-[#85A019] flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    BUY NOW
                </button>
            </div>

            <!-- Image part -->
            <div>
                <img class="w-full" src="/images/model.png" alt="">
            </div>
        </section>
    </header>

    <!-- Main -->
    <main>

    </main>

    <!-- Footer -->
    <footer>

    </footer>
</body>

</html>
